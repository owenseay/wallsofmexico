  /* -- canvas section -- */
  .canvas-section {

    width: 100%;
    height: 100vh;
  }

  #pixelCanvas {

    width: 100%;
    height: 100%;

  }

  /* -- regenerate button -- */
  .regen-btn {

    left: 50%;
    transform: translateX(-50%);

    font-size: 10px;
    font-weight: 500;

    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    cursor: pointer;
    transition: all 0.3s;
    z-index: 50;
    display: none;
  }

  .regen-btn:hover {
    background: rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.8);
  }

  /* -- site mark -- */
  .site-mark {
    position: fixed;
    top: 16px;
    left: 20px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.12);

    pointer-events: none;

    position: fixed;
    top: 16px;
    right: 20px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.12);
    z-index: 50;
    pointer-events: none;
    display: none;
  }

  /* -- lightbox -- */
  .lightbox {
    position: fixed;
    inset: 0;
    z-index: 1000;
    background: rgba(0,0,0,0.92);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .lightbox.open {
    display: flex;
    opacity: 1;
  }

  .lightbox img {
    max-width: 88vw;
    max-height: 80vh;
    object-fit: contain;
  }

  .lightbox-info {
    margin-top: 20px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .lightbox-swatch {
    width: 24px;
    height: 24px;
    border-radius: 50%;

  }

    font-size: 12px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);

    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;

    padding: 20px;

, "hex": "#aa9f86"}, {"num": "100", "name": "Yoyo", "file": "100_Yoyo.jpg", "r": 164, "g": 164, "b": 163, "hue": 60, "sat": 1, "lit": 64, "hex": "#a4a4a3"}];

const canvas = document.getElementById('pixelCanvas');
const ctx = canvas.getContext('2d');
const hero = document.getElementById('hero');
const canvasSection = document.getElementById('canvasSection');
const regenBtn = document.getElementById('regenBtn');
const siteMark = document.getElementById('siteMark');
const counterEl = document.getElementById('counter');

let pixels = []; // each pixel: { x, y, w, h, wallIndex }
let currentPattern = 0;
const patterns = ['scatter', 'mosaic', 'flow', 'grid', 'wave'];

// ---- Scroll from hero to canvas ----
let onCanvas = false;

window.addEventListener('wheel', (e) => {
  if (!onCanvas && e.deltaY > 0) {
    onCanvas = true;
    hero.style.transition = 'transform 0.8s ease, opacity 0.8s ease';
    hero.style.transform = 'translateY(-100vh)';
    hero.style.opacity = '0';
    canvasSection.style.position = 'fixed';
    canvasSection.style.inset = '0';
    document.body.style.overflow = 'hidden';
    regenBtn.style.display = 'block';
    siteMark.style.display = 'block';
    counterEl.style.display = 'block';
    resizeCanvas();
    generate();
  }
}, { passive: true });

// ---- Canvas setup ----
function resizeCanvas() {
  canvas.width = window.innerWidth * devicePixelRatio;
  canvas.height = window.innerHeight * devicePixelRatio;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  ctx.scale(devicePixelRatio, devicePixelRatio);
}

window.addEventListener('resize', () => {
  if (onCanvas) {
    resizeCanvas();
    generate();
  }
});

// ---- Pattern generators ----
function generate() {
  const W = window.innerWidth;
  const H = window.innerHeight;
  pixels = [];
  ctx.clearRect(0, 0, W, H);

  const pattern = patterns[currentPattern % patterns.length];

  if (pattern === 'scatter') generateScatter(W, H);
  else if (pattern === 'mosaic') generateMosaic(W, H);
  else if (pattern === 'flow') generateFlow(W, H);
  else if (pattern === 'grid') generateGrid(W, H);
  else if (pattern === 'wave') generateWave(W, H);
}

function generateScatter(W, H) {
  const count = 2000;
  for (let i = 0; i < count; i++) {
    const wi = Math.floor(Math.random() * WALLS.length);
    const w = WALLS[wi];
    const size = 4 + Math.random() * 30;
    const x = Math.random() * (W - size);
    const y = Math.random() * (H - size);
    const alpha = 0.4 + Math.random() * 0.6;

    ctx.fillStyle = `rgba(${w.r},${w.g},${w.b},${alpha})`;
    ctx.fillRect(x, y, size, size);
    pixels.push({ x, y, w: size, h: size, wallIndex: wi });
  }
}

function generateMosaic(W, H) {
  const cols = 30 + Math.floor(Math.random() * 20);
  const cellW = W / cols;
  const rows = Math.ceil(H / cellW);

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const wi = Math.floor(Math.random() * WALLS.length);
      const w = WALLS[wi];
      const x = c * cellW;
      const y = r * cellW;
      const jitter = cellW * 0.05;
      const jx = (Math.random() - 0.5) * jitter;
      const jy = (Math.random() - 0.5) * jitter;

      ctx.fillStyle = `rgb(${w.r},${w.g},${w.b})`;
      ctx.fillRect(x + jx, y + jy, cellW + 0.5, cellW + 0.5);
      pixels.push({ x: x + jx, y: y + jy, w: cellW, h: cellW, wallIndex: wi });
    }
  }
}

function generateFlow(W, H) {
  const count = 3000;
  const seed = Math.random() * 1000;

  for (let i = 0; i < count; i++) {
    const wi = Math.floor(Math.random() * WALLS.length);
    const w = WALLS[wi];

    let x = Math.random() * W;
    let y = Math.random() * H;
    const size = 3 + Math.random() * 12;
    const angle = (Math.sin(x * 0.008 + seed) + Math.cos(y * 0.006 + seed)) * Math.PI;

    // Drift along flow field
    x += Math.cos(angle) * size * 2;
    y += Math.sin(angle) * size * 2;

    const alpha = 0.3 + Math.random() * 0.5;
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    ctx.fillStyle = `rgba(${w.r},${w.g},${w.b},${alpha})`;
    ctx.fillRect(-size/2, -size * 1.5, size, size * 3);
    ctx.restore();

    pixels.push({ x: x - size, y: y - size * 1.5, w: size * 2, h: size * 3, wallIndex: wi });
  }
}

function generateGrid(W, H) {
  const size = 8 + Math.random() * 12;
  const gap = 2;
  const cols = Math.floor(W / (size + gap));
  const rows = Math.floor(H / (size + gap));
  const offsetX = (W - cols * (size + gap)) / 2;
  const offsetY = (H - rows * (size + gap)) / 2;

  // Sort walls by hue for a gradient effect
  const sorted = [...WALLS].sort((a, b) => a.hue - b.hue);

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const progress = (r * cols + c) / (rows * cols);
      const wi = Math.floor(progress * WALLS.length) % WALLS.length;
      const w = sorted[wi];
      const origIndex = WALLS.indexOf(w);
      const x = offsetX + c * (size + gap);
      const y = offsetY + r * (size + gap);

      ctx.fillStyle = `rgb(${w.r},${w.g},${w.b})`;
      ctx.fillRect(x, y, size, size);
      pixels.push({ x, y, w: size, h: size, wallIndex: origIndex });
    }
  }
}

function generateWave(W, H) {
  const count = 2500;
  const freq = 0.005 + Math.random() * 0.01;
  const amp = 50 + Math.random() * 100;
  const phase = Math.random() * Math.PI * 2;

  for (let i = 0; i < count; i++) {
    const wi = Math.floor(Math.random() * WALLS.length);
    const w = WALLS[wi];
    const size = 4 + Math.random() * 16;

    const baseX = Math.random() * W;
    const baseY = Math.random() * H;
    const wave = Math.sin(baseX * freq + phase) * amp;
    const y = baseY + wave * 0.3;
    const alpha = 0.3 + Math.random() * 0.6;

    ctx.beginPath();
    ctx.arc(baseX, y, size / 2, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${w.r},${w.g},${w.b},${alpha})`;
    ctx.fill();
    pixels.push({ x: baseX - size/2, y: y - size/2, w: size, h: size, wallIndex: wi });
  }
}

// ---- Regenerate ----
regenBtn.addEventListener('click', () => {
  currentPattern++;
  generate();
});

// ---- Click to open wall photo ----
canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  // Search pixels in reverse (top-most first)
  for (let i = pixels.length - 1; i >= 0; i--) {
    const p = pixels[i];
    if (mx >= p.x && mx <= p.x + p.w && my >= p.y && my <= p.y + p.h) {
      openLightbox(p.wallIndex);
      return;
    }
  }
});

// ---- Lightbox ----
const lightbox = document.getElementById('lightbox');
const lbImg = document.getElementById('lbImg');
const lbName = document.getElementById('lbName');
const lbSwatch = document.getElementById('lbSwatch');
let lbIndex = 0;

function openLightbox(i) {
  lbIndex = i;
  const w = WALLS[i];
  lbImg.src = 'med/' + w.file;
  lbImg.alt = w.name;
  lbName.textContent = w.name + ' ' + w.num;
  lbSwatch.style.background = w.hex;
  lightbox.classList.add('open');
}

function closeLightbox() {
  lightbox.classList.remove('open');
}

function navigateLb(dir) {
  lbIndex = (lbIndex + dir + WALLS.length) % WALLS.length;
  const w = WALLS[lbIndex];
  lbImg.src = 'med/' + w.file;
  lbImg.alt = w.name;
  lbName.textContent = w.name + ' ' + w.num;
  lbSwatch.style.background = w.hex;
}

lightbox.addEventListener('click', (e) => {
  if (e.target === lightbox || e.target === lbImg || e.target === lbName) {
    closeLightbox();
  }
});

document.getElementById('lbPrev').addEventListener('click', (e) => {
  e.stopPropagation();
  navigateLb(-1);
});

document.getElementById('lbNext').addEventListener('click', (e) => {
  e.stopPropagation();
  navigateLb(1);
});

document.addEventListener('keydown', (e) => {
  if (lightbox.classList.contains('open')) {
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') navigateLb(-1);
    if (e.key === 'ArrowRight') navigateLb(1);
  }
});
</script>
