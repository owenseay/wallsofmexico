  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {

    color: #fff;
    font-family: -apple-system, sans-serif;
    overflow: hidden;
    height: 100vh;
  }

  /* -- canvas section -- */
  .canvas-section {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100vh;
  }

  #pixelCanvas {
    display: block;
    width: 100%;
    height: 100%;
    cursor: crosshair;
  }

  /* -- regenerate button -- */
  /* -- bottom controls -- */
  .bottom-controls {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    z-index: 50;
  }

  .control-btn {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px;
    padding: 8px 20px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    cursor: pointer;
    transition: all 0.3s;
    font-family: inherit;
  }

  .control-btn:hover {
    background: rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.8);
  }

  /* -- site mark -- */
  .site-mark {
    position: fixed;
    top: 16px;
    left: 20px;
    z-index: 50;
    pointer-events: none;
  }

  .site-mark img {
    height: 28px;
    opacity: 0.7;
  }

  .counter {
    position: fixed;
    top: 16px;
    right: 20px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.12);
    z-index: 50;
    pointer-events: none;
  }

  /* -- video lightbox -- */
  .video-lightbox {
    position: fixed;
    inset: 0;
    z-index: 2000;
    background: rgba(0,0,0,0.80);
    display: none;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .video-lightbox.open {
    display: flex;
    opacity: 1;
  }

  .video-lightbox iframe {
    width: 88vw;
    height: 50vw;
    max-height: 80vh;
    max-width: 142vh;
    border: none;
    border-radius: 4px;
    pointer-events: auto;
  }

  .video-close {
    position: absolute;
    top: 20px;
    right: 24px;
    background: none;
    border: none;
    color: rgba(255,255,255,0.4);
    font-size: 32px;
    cursor: pointer;
    transition: color 0.2s;
    z-index: 2001;
  }

  .video-close:hover {
    color: rgba(255,255,255,0.8);
  }

  /* -- lightbox -- */
  .lightbox {
    position: fixed;
    inset: 0;
    z-index: 1000;
    background: rgba(0,0,0,0.80);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .lightbox.open {
    display: flex;
    opacity: 1;
  }

  .lightbox img {
    max-width: 88vw;
    max-height: 80vh;
    object-fit: contain;
    transition: transform 0.2s ease, opacity 0.2s ease;
    -webkit-user-drag: none;
    user-select: none;
    pointer-events: auto;
  }

  .lightbox img.sliding {
    opacity: 0;
  }

  .lightbox-info {
    margin-top: 20px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .lightbox-swatch {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.2);
  }

  .lightbox-name {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
  }

  .lightbox-pin {
    background: none;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 50%;
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 14px;
    color: rgba(255,255,255,0.4);
    padding: 0;
  }

  .lightbox-pin:hover,
  .lightbox-pin.active {
    background: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.8);
    border-color: rgba(255,255,255,0.3);
  }

  .lightbox-pin.hidden {
    display: none;
  }

  .lightbox-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: rgba(255,255,255,0.3);
    font-size: 40px;
    cursor: pointer;
    padding: 20px;
    transition: color 0.2s;
    z-index: 1001;
  }

  .lightbox-nav:hover {
    color: rgba(255,255,255,0.7);
  }

  .lightbox-prev { left: 10px; }
  .lightbox-next { right: 10px; }

  /* -- responsive -- */
  @media (max-width: 600px) {
    .lightbox-nav { display: none; }
    .bottom-controls { bottom: 16px; gap: 8px; }
    .control-btn { padding: 10px 22px; font-size: 11px; }
  }
</style>

const canvas = document.getElementById('pixelCanvas');
const ctx = canvas.getContext('2d');
const regenBtn = document.getElementById('regenBtn');
const videoBtn = document.getElementById('videoBtn');
const videoLightbox = document.getElementById('videoLightbox');
const videoFrame = document.getElementById('videoFrame');
const videoClose = document.getElementById('videoClose');

let pixels = []; // each pixel: { x, y, w, h, wallIndex }
let currentPattern = 0;
const patterns = ['scatter', 'mosaic', 'flow', 'grid', 'wave'];

// ---- Canvas setup ----
function resizeCanvas() {
  canvas.width = window.innerWidth * devicePixelRatio;
  canvas.height = window.innerHeight * devicePixelRatio;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  ctx.scale(devicePixelRatio, devicePixelRatio);
}

window.addEventListener('resize', () => {
  resizeCanvas();
  generate();
});

// ---- Pattern generators ----
function generate() {
  const W = window.innerWidth;
  const H = window.innerHeight;
  pixels = [];
  ctx.clearRect(0, 0, W, H);

  const pattern = patterns[currentPattern % patterns.length];

  if (pattern === 'scatter') generateScatter(W, H);
  else if (pattern === 'mosaic') generateMosaic(W, H);
  else if (pattern === 'flow') generateFlow(W, H);
  else if (pattern === 'grid') generateGrid(W, H);
  else if (pattern === 'wave') generateWave(W, H);
}

function generateScatter(W, H) {
  const count = 2000;
  for (let i = 0; i < count; i++) {
    const wi = Math.floor(Math.random() * WALLS.length);
    const w = WALLS[wi];
    const size = 4 + Math.random() * 30;
    const x = Math.random() * (W - size);
    const y = Math.random() * (H - size);
    const alpha = 0.4 + Math.random() * 0.6;

    ctx.fillStyle = `rgba(${w.r},${w.g},${w.b},${alpha})`;
    ctx.fillRect(x, y, size, size);
    pixels.push({ x, y, w: size, h: size, wallIndex: wi });
  }
}

function generateMosaic(W, H) {
  const cols = 30 + Math.floor(Math.random() * 20);
  const cellW = W / cols;
  const rows = Math.ceil(H / cellW);

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const wi = Math.floor(Math.random() * WALLS.length);
      const w = WALLS[wi];
      const x = c * cellW;
      const y = r * cellW;
      const jitter = cellW * 0.05;
      const jx = (Math.random() - 0.5) * jitter;
      const jy = (Math.random() - 0.5) * jitter;

      ctx.fillStyle = `rgb(${w.r},${w.g},${w.b})`;
      ctx.fillRect(x + jx, y + jy, cellW + 0.5, cellW + 0.5);
      pixels.push({ x: x + jx, y: y + jy, w: cellW, h: cellW, wallIndex: wi });
    }
  }
}

function generateFlow(W, H) {
  const count = 3000;
  const seed = Math.random() * 1000;

  for (let i = 0; i < count; i++) {
    const wi = Math.floor(Math.random() * WALLS.length);
    const w = WALLS[wi];

    let x = Math.random() * W;
    let y = Math.random() * H;
    const size = 3 + Math.random() * 12;
    const angle = (Math.sin(x * 0.008 + seed) + Math.cos(y * 0.006 + seed)) * Math.PI;

    // Drift along flow field
    x += Math.cos(angle) * size * 2;
    y += Math.sin(angle) * size * 2;

    const alpha = 0.3 + Math.random() * 0.5;
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    ctx.fillStyle = `rgba(${w.r},${w.g},${w.b},${alpha})`;
    ctx.fillRect(-size/2, -size * 1.5, size, size * 3);
    ctx.restore();

    pixels.push({ x: x - size, y: y - size * 1.5, w: size * 2, h: size * 3, wallIndex: wi });
  }
}

function generateGrid(W, H) {
  const size = 8 + Math.random() * 12;
  const gap = 2;
  const cols = Math.floor(W / (size + gap));
  const rows = Math.floor(H / (size + gap));
  const offsetX = (W - cols * (size + gap)) / 2;
  const offsetY = (H - rows * (size + gap)) / 2;

  // Sort walls by hue for a gradient effect
  const sorted = [...WALLS].sort((a, b) => a.hue - b.hue);

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const progress = (r * cols + c) / (rows * cols);
      const wi = Math.floor(progress * WALLS.length) % WALLS.length;
      const w = sorted[wi];
      const origIndex = WALLS.indexOf(w);
      const x = offsetX + c * (size + gap);
      const y = offsetY + r * (size + gap);

      ctx.fillStyle = `rgb(${w.r},${w.g},${w.b})`;
      ctx.fillRect(x, y, size, size);
      pixels.push({ x, y, w: size, h: size, wallIndex: origIndex });
    }
  }
}

function generateWave(W, H) {
  const count = 2500;
  const freq = 0.005 + Math.random() * 0.01;
  const amp = 50 + Math.random() * 100;
  const phase = Math.random() * Math.PI * 2;

  for (let i = 0; i < count; i++) {
    const wi = Math.floor(Math.random() * WALLS.length);
    const w = WALLS[wi];
    const size = 4 + Math.random() * 16;

    const baseX = Math.random() * W;
    const baseY = Math.random() * H;
    const wave = Math.sin(baseX * freq + phase) * amp;
    const y = baseY + wave * 0.3;
    const alpha = 0.3 + Math.random() * 0.6;

    ctx.beginPath();
    ctx.arc(baseX, y, size / 2, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${w.r},${w.g},${w.b},${alpha})`;
    ctx.fill();
    pixels.push({ x: baseX - size/2, y: y - size/2, w: size, h: size, wallIndex: wi });
  }
}

// ---- Regenerate ----
regenBtn.addEventListener('click', () => {
  currentPattern++;
  generate();
});

// ---- Click to open wall photo ----
canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  // Search pixels in reverse (top-most first)
  for (let i = pixels.length - 1; i >= 0; i--) {
    const p = pixels[i];
    if (mx >= p.x && mx <= p.x + p.w && my >= p.y && my <= p.y + p.h) {
      openLightbox(p.wallIndex);
      return;
    }
  }
});

// ---- Lightbox ----
const lightbox = document.getElementById('lightbox');
const lbImg = document.getElementById('lbImg');
const lbName = document.getElementById('lbName');
const lbSwatch = document.getElementById('lbSwatch');
const lbPin = document.getElementById('lbPin');
let lbIndex = 0;
let lbQueue = [];  // shuffled order for swiping
let lbQueuePos = 0;

function updateMapPin(w) {
  if (w.lat && w.lng) {
    lbPin.classList.remove('hidden');
  } else {
    lbPin.classList.add('hidden');
  }
}

lbPin.addEventListener('click', (e) => {
  e.stopPropagation();
  const w = WALLS[lbIndex];
  if (w.lat && w.lng) {
    window.open(`https://www.google.com/maps?q=${w.lat},${w.lng}&z=18&t=k`, '_blank');
  }
});

function buildQueue(startIndex) {
  // Build shuffled array of all indices except the starting one
  const others = [];
  for (let i = 0; i < WALLS.length; i++) {
    if (i !== startIndex) others.push(i);
  }
  // Fisher-Yates shuffle
  for (let i = others.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [others[i], others[j]] = [others[j], others[i]];
  }
  // Start wall first, then shuffled rest
  lbQueue = [startIndex, ...others];
  lbQueuePos = 0;
}

function openLightbox(i) {
  lbIndex = i;
  buildQueue(i);
  const w = WALLS[i];
  lbImg.src = 'med/' + w.file;
  lbImg.alt = w.name;
  lbName.textContent = w.name + ' ' + w.num;
  lbSwatch.style.background = w.hex;
  updateMapPin(w);
  lightbox.classList.add('open');
}

function closeLightbox() {
  lightbox.classList.remove('open');
}

let isAnimating = false;

function navigateLb(dir) {
  if (isAnimating) return;
  isAnimating = true;

  // Fade out
  lbImg.classList.add('sliding');

  setTimeout(() => {
    // Navigate through shuffled queue
    lbQueuePos = (lbQueuePos + dir + lbQueue.length) % lbQueue.length;
    lbIndex = lbQueue[lbQueuePos];
    const w = WALLS[lbIndex];
    lbImg.src = 'med/' + w.file;
    lbImg.alt = w.name;
    lbName.textContent = w.name + ' ' + w.num;
    lbSwatch.style.background = w.hex;
    updateMapPin(w);

    // Fade in once loaded
    lbImg.onload = () => {
      lbImg.classList.remove('sliding');
      lbImg.onload = null;
      setTimeout(() => { isAnimating = false; }, 200);
    };
    // Fallback in case onload doesn't fire (cached image)
    setTimeout(() => {
      lbImg.classList.remove('sliding');
      isAnimating = false;
    }, 300);
  }, 200);
}

lightbox.addEventListener('click', (e) => {
  if (e.target === lightbox || e.target === lbImg || e.target === lbName) {
    closeLightbox();
  }
});

document.getElementById('lbPrev').addEventListener('click', (e) => {
  e.stopPropagation();
  navigateLb(-1);
});

document.getElementById('lbNext').addEventListener('click', (e) => {
  e.stopPropagation();
  navigateLb(1);
});

document.addEventListener('keydown', (e) => {
  if (videoLightbox.classList.contains('open')) {
    if (e.key === 'Escape') closeVideo();
    return;
  }
  if (lightbox.classList.contains('open')) {
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') navigateLb(-1);
    if (e.key === 'ArrowRight') navigateLb(1);
  }
});

// ---- Video lightbox ----
const YOUTUBE_URL = 'https://www.youtube.com/embed/bJJ_WOLfjdA?autoplay=1&rel=0';

function openVideo() {
  videoFrame.src = YOUTUBE_URL;
  videoLightbox.classList.add('open');
}

function closeVideo() {
  videoLightbox.classList.remove('open');
  videoFrame.src = '';
}

videoBtn.addEventListener('click', openVideo);
videoClose.addEventListener('click', closeVideo);
videoLightbox.addEventListener('click', (e) => {
  if (e.target === videoLightbox) closeVideo();
});

// ---- Swipe gestures for lightbox ----
let touchStartX = 0;
let touchStartY = 0;

lightbox.addEventListener('touchstart', (e) => {
  touchStartX = e.changedTouches[0].screenX;
  touchStartY = e.changedTouches[0].screenY;
}, { passive: true });

lightbox.addEventListener('touchend', (e) => {
  const dx = e.changedTouches[0].screenX - touchStartX;
  const dy = e.changedTouches[0].screenY - touchStartY;

  // Only count horizontal swipes (ignore vertical)
  if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.5) {
    if (dx > 0) navigateLb(-1);  // swipe right = previous
    else navigateLb(1);           // swipe left = next
  }
});

// ---- Launch canvas on load ----
resizeCanvas();
generate();
</script>
